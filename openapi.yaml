openapi: 3.1.0
info:
  title: Hindsight API
  description: |
    Integrate Hindsight competitive intelligence, win-loss insights, and deal data into your applications.
    
    ## Authentication
    All API requests require a Bearer token in the Authorization header:
    ```
    Authorization: Bearer YOUR_API_KEY
    ```
    
    Get your API key from the [Hindsight dashboard](https://app.usehindsight.com/settings/keys).
    
    ## Rate Limits
    
    API requests are rate-limited per plan:
    
    | Plan | Per Minute | Per Month |
    |------|-----------|----------|
    | Essentials | 10 | 10,000 |
    | Growth | 60 | 30,000 |
    | Enterprise | 300 | 100,000 |
    
    When a limit is exceeded, the API returns a `429` response. Check the `Retry-After` header for when to retry.
  version: 1.0.0
  contact:
    name: Hindsight Support
    url: https://usehindsight.com/support
    email: support@hindsight.com

servers:
  - url: https://app.usehindsight.com/api/v1
    description: Production server

security:
  - bearerAuth: []

tags:
  - name: Chat
    description: AI-powered chat completions with competitive intelligence
  - name: Deals
    description: Access and export deal data
  - name: Documents
    description: Upload and manage documents

paths:
  /responses:
    post:
      operationId: createResponse
      summary: Create a response
      description: |
        Send a message and receive an AI-generated response with citations from your competitive intelligence data.
        Hindsight automatically orchestrates multiple searches across deals, competitors, and knowledge base to provide comprehensive answers.
      tags:
        - Chat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatCompletionRequest'
            examples:
              basic:
                summary: Basic question
                value:
                  messages:
                    - role: user
                      content: "What security objections have we encountered with Enterprise customers?"
                  stream: false
              withHistory:
                summary: With conversation history
                value:
                  messages:
                    - role: user
                      content: "What are common objections to our enterprise tier?"
                    - role: assistant
                      content: "Based on recent deals, the main objections are..."
                    - role: user
                      content: "How should we handle the pricing objection?"
                  stream: false
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatCompletionResponse'
            text/event-stream:
              schema:
                type: string
                description: Server-Sent Events stream for streaming responses
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /deals:
    get:
      operationId: getDeals
      summary: Get deals with filtering and pagination
      description: |
        Retrieve deals with flexible filtering, sorting, and pagination.
        Returns deal objects with all their properties and relationships.
        Use this for real-time data access and integrations.
      tags:
        - Deals
      parameters:
        - name: page_size
          in: query
          schema:
            type: integer
            default: 50
            maximum: 100
          description: Number of deals per page
        - name: page_index
          in: query
          schema:
            type: integer
            default: 0
          description: Zero-based page index
        - name: count
          in: query
          schema:
            type: boolean
          description: If true, returns only the total count
        - name: sort
          in: query
          schema:
            type: string
            enum: [created_at, updated_at, close_date, amount, name]
          description: Column to sort by
        - name: sort_order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
          description: Sort direction
        - name: columns
          in: query
          schema:
            type: string
          description: Comma-separated list of columns to return
        - name: searchQuery
          in: query
          schema:
            type: string
          description: Fuzzy search across deal names
        - name: status
          in: query
          schema:
            type: string
          description: JSON array of deal stages
        - name: owner_ids
          in: query
          schema:
            type: string
          description: JSON array of owner IDs
        - name: close_date
          in: query
          schema:
            type: string
          description: "JSON object: {\"from\": \"2026-01-01\", \"to\": \"2026-03-31\"}"
        - name: amount
          in: query
          schema:
            type: string
          description: "JSON object: {\"min\": 10000, \"max\": 100000}"
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                oneOf:
                  - type: array
                    items:
                      $ref: '#/components/schemas/Deal'
                  - type: integer
                    description: Total count when count=true
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /deals/export:
    post:
      operationId: exportDeals
      summary: Bulk export deals to CSV
      description: |
        Generate a CSV file of deal data with flexible filtering and column selection.
        Returns an export_id to track the job status and download the file when ready.
      tags:
        - Deals
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExportDealsRequest'
      responses:
        '200':
          description: Export job started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportDealsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
        '500':
          $ref: '#/components/responses/InternalServerError'
    
  /deals/export/{export_id}:
    get:
      operationId: getExportStatus
      summary: Get export status
      description: |
        Check the status of a bulk export job and get the download URL when ready.
      tags:
        - Deals
      parameters:
        - name: export_id
          in: path
          required: true
          schema:
            type: string
          description: Export ID from the initial export request
      responses:
        '200':
          description: Export status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportStatusResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Export not found
        '500':
          $ref: '#/components/responses/InternalServerError'

  /documents/library:
    post:
      operationId: uploadLibraryDocument
      summary: Upload document to knowledge base
      description: |
        Upload competitive intelligence documents, assets, and other files to your library.
        Documents are automatically processed, chunked, and indexed for search.
      tags:
        - Documents
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LibraryDocumentUploadRequest'
            examples:
              withUrl:
                summary: Upload from URL
                value:
                  file_name: "Competitor X Pricing Guide.pdf"
                  file_url: "https://example.com/document.pdf"
                  content_type: "application/pdf"
                  type: "asset"
                  competitor_id: "comp_123"
                  source: "drive"
              withFile:
                summary: Upload binary file
                value:
                  file_name: "Battlecard.md"
                  file: "<binary file content>"
                  content_type: "text/markdown"
                  type: "asset"
                  competitor_name: "Competitor X"
                  source: "notion"
      responses:
        '200':
          description: Document upload initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentUploadResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /deals/documents:
    post:
      operationId: uploadDealDocument
      summary: Upload document to a deal
      description: |
        Associate documents with specific deals for win-loss analysis.
        Audio and video files are automatically transcribed.
        Documents are processed and used to enrich deal insights.
      tags:
        - Documents
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DealDocumentUploadRequest'
            examples:
              withDealId:
                summary: Upload with Hindsight deal ID
                value:
                  file_name: "Discovery Call Notes.pdf"
                  file_url: "https://example.com/document.pdf"
                  content_type: "application/pdf"
                  deal_id: "deal_123"
                  source: "gong"
              withSalesforceId:
                summary: Upload with Salesforce ID
                value:
                  file_name: "Call Recording.mp3"
                  file_url: "https://example.com/recording.mp3"
                  content_type: "audio/mpeg"
                  salesforce_id: "006xxxxxxxxxxxx"
                  source: "gong"
              withHubspotId:
                summary: Upload with HubSpot ID
                value:
                  file_name: "Email Thread.eml"
                  file: "<binary file content>"
                  content_type: "message/rfc822"
                  hubspot_id: "12345678"
                  source: "Hubspot"
      responses:
        '200':
          description: Document upload initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentUploadResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Deal not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: "not_found"
                  message: "Deal with the specified ID was not found"
        '429':
          $ref: '#/components/responses/RateLimitExceeded'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: API key from Hindsight dashboard

  schemas:
    ChatCompletionRequest:
      type: object
      required:
        - messages
      properties:
        messages:
          type: array
          description: The conversation messages
          items:
            $ref: '#/components/schemas/Message'
          minItems: 1
        stream:
          type: boolean
          description: Whether to stream the response using Server-Sent Events
          default: false

    Message:
      type: object
      required:
        - role
        - content
      properties:
        role:
          type: string
          enum: [user, assistant, system]
          description: The role of the message author
        content:
          type: string
          description: The content of the message

    ChatCompletionResponse:
      type: object
      properties:
        message:
          type: object
          properties:
            role:
              type: string
              enum: [assistant]
            content:
              type: string
              description: The AI-generated response with inline citations
            citations:
              type: array
              description: Source documents referenced in the response
              items:
                $ref: '#/components/schemas/Citation'
        tool_calls:
          type: array
          description: The internal tools that were called to generate the response
          items:
            type: string
          example: ["search_across_deals", "search_deal_documents"]

    Citation:
      type: object
      properties:
        document_id:
          type: string
          description: Unique identifier for the source document
        document_name:
          type: string
          description: Name of the source document
        deal_id:
          type: string
          nullable: true
          description: Associated deal ID, if applicable
        deal_name:
          type: string
          nullable: true
          description: Associated deal name, if applicable
        url:
          type: string
          format: uri
          description: URL to view the document in Hindsight
          example: "https://app.usehindsight.com/deals/deal_123/documents/viewer/doc_abc123"
        excerpt:
          type: string
          description: Relevant excerpt from the document

    Deal:
      type: object
      properties:
        id:
          type: string
          description: Hindsight deal ID
          example: "deal_123"
        name:
          type: string
          description: Deal name
          example: "Acme Corp - Enterprise License"
        amount:
          type: number
          description: Deal value
          example: 50000
        status_id:
          type: string
          description: Current deal stage ID
          example: "negotiation"
        previous_status_id:
          type: string
          nullable: true
          description: Previous deal stage ID
          example: "qualification"
        proposal_due:
          type: string
          format: date
          description: Expected or actual close date
          example: "2026-03-15"
        created_at:
          type: string
          format: date-time
          description: Deal creation timestamp
        owner_id:
          type: string
          description: Deal owner ID
        salesforce_id:
          type: string
          nullable: true
          description: Salesforce Opportunity ID
        hubspot_id:
          type: string
          nullable: true
          description: HubSpot Deal ID
        deal_analyzed:
          type: boolean
          description: Whether deal has been analyzed
        analysis_verified:
          type: boolean
          description: Whether analysis has been verified
        type:
          type: string
          nullable: true
          description: Type of deal
          example: "New Business"
        region:
          type: string
          nullable: true
          description: Geographic region
        deal_competitor_associations:
          type: array
          items:
            type: object
            properties:
              competitor_id:
                type: string
              is_primary:
                type: boolean
              is_incumbent:
                type: boolean
          description: Array of competitor associations
        drivers:
          type: array
          items:
            type: object
            properties:
              reason_id:
                type: string
              positive:
                type: boolean
                nullable: true
              summary:
                type: string
          description: Array of deal drivers/reasons
        wl_product_fit_score:
          type: number
          nullable: true
          description: Product fit score (1-5)
        wl_sales_execution_score:
          type: number
          nullable: true
          description: Sales execution score (1-5)
        wl_relationship_score:
          type: number
          nullable: true
          description: Relationship score (1-5)

    ExportDealsRequest:
      type: object
      required:
        - columns
      properties:
        columns:
          type: array
          items:
            type: string
          description: Array of column IDs to include in the export
          example: ["name", "amount", "stage", "close_date"]
        filters:
          type: object
          description: Optional filters to apply
          properties:
            deal_ids:
              type: array
              items:
                type: string
              description: Specific deal IDs to export
            owner_ids:
              type: array
              items:
                type: string
              description: Filter by owner IDs
            status:
              type: array
              items:
                type: string
              description: Filter by deal stages
            close_date:
              type: object
              properties:
                from:
                  type: string
                  format: date
                to:
                  type: string
                  format: date
            amount:
              type: object
              properties:
                min:
                  type: number
                max:
                  type: number
            competitor_ids:
              type: array
              items:
                type: string
            deal_type:
              type: array
              items:
                type: string
            region:
              type: array
              items:
                type: string
            industry:
              type: array
              items:
                type: string
            analyzed:
              type: boolean
            verified:
              type: boolean

    ExportDealsResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        export_id:
          type: string
          description: Unique export job ID
          example: "exp_abc123"
        status:
          type: string
          enum: [pending]
          description: Initial status is always pending
        message:
          type: string
          example: "Export job started successfully"
        estimated_completion:
          type: string
          example: "2-3 minutes"

    ExportStatusResponse:
      type: object
      properties:
        export_id:
          type: string
          example: "exp_abc123"
        status:
          type: string
          enum: [pending, completed, failed]
          description: Current export status
        download_url:
          type: string
          format: uri
          nullable: true
          description: Download URL (available when status is completed)
        rows_exported:
          type: integer
          nullable: true
          description: Number of rows in the export
        error:
          type: string
          nullable: true
          description: Error message if status is failed
        created_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
          nullable: true
        failed_at:
          type: string
          format: date-time
          nullable: true
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: When the download URL expires (7 days after completion)

    LibraryDocumentUploadRequest:
      type: object
      required:
        - file_name
        - content_type
        - type
      properties:
        file_name:
          type: string
          description: Name of the file
          example: "Competitor X Pricing Guide.pdf"
        file_url:
          type: string
          format: uri
          description: URL to download the file from (provide either file_url or file)
          example: "https://example.com/document.pdf"
        file:
          type: string
          format: binary
          description: Binary file content (provide either file or file_url)
        content_type:
          type: string
          description: MIME type of the file
          example: "application/pdf"
          enum:
            - application/pdf
            - text/markdown
            - text/plain
            - application/vnd.openxmlformats-officedocument.wordprocessingml.document
            - application/vnd.openxmlformats-officedocument.presentationml.presentation
            - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
        type:
          type: string
          description: Document type
          enum:
            - asset
            - intel
        competitor_id:
          type: string
          description: Hindsight competitor ID (provide either competitor_id or competitor_name)
          example: "comp_123"
        competitor_name:
          type: string
          description: Competitor name - will be resolved to competitor_id automatically
          example: "Competitor X"
        source:
          type: string
          description: Source application where the document originated
          enum:
            - drive
            - notion
            - confluence
            - onedrive
            - sharepoint
            - vanta
            - url
            - zapier
            - api
          example: "drive"
    DealDocumentUploadRequest:
      type: object
      required:
        - file_name
        - content_type
      properties:
        file_name:
          type: string
          description: Name of the file
          example: "Discovery Call Notes.pdf"
        file_url:
          type: string
          format: uri
          description: URL to download the file from (provide either file_url or file)
        file:
          type: string
          format: binary
          description: Binary file content (provide either file or file_url)
        content_type:
          type: string
          description: MIME type of the file
          example: "application/pdf"
        deal_id:
          type: string
          description: Hindsight deal ID (provide one of deal_id, salesforce_id, or hubspot_id)
          example: "deal_123"
        salesforce_id:
          type: string
          description: Salesforce Opportunity ID
          example: "006xxxxxxxxxxxx"
        hubspot_id:
          type: string
          description: HubSpot Deal ID
          example: "12345678"
        source:
          type: string
          description: Source application where the document originated
          enum:
            - gong
            - clari
            - fathom
            - fireflies
            - avoma
            - outreach
            - gmail
            - Salesforce
            - Hubspot
            - api
          example: "gong"

    DocumentUploadResponse:
      type: object
      properties:
        document:
          type: object
          properties:
            id:
              type: string
              description: Unique identifier for the document
              example: "doc_abc123"
            file_name:
              type: string
              description: Name of the uploaded file
              example: "Competitor X Pricing Guide.pdf"
            status:
              type: string
              description: Processing status of the document
              enum:
                - processing
                - ready
                - failed
              example: "processing"
            type:
              type: string
              description: Document type
              enum:
                - asset
                - intel
              example: "asset"
            url:
              type: string
              format: uri
              description: URL to view the document in Hindsight
              example: "https://app.usehindsight.com/deals/deal_123/documents/viewer/doc_abc123"
            created_at:
              type: string
              format: date-time
              description: Timestamp when the document was created
              example: "2026-02-10T12:00:00Z"
        run_id:
          type: string
          description: ID to track the document processing run
          example: "run_xyz789"

    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              description: Error code
              example: "unauthorized"
            message:
              type: string
              description: Human-readable error message
              example: "Invalid API key"
            details:
              type: object
              description: Additional error details
              additionalProperties: true

  responses:
    BadRequest:
      description: Bad request - invalid parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: "bad_request"
              message: "Invalid parameters"
              details:
                missing_fields: ["file_name"]

    Unauthorized:
      description: Unauthorized - invalid or missing API key
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: "unauthorized"
              message: "Invalid API key"

    RateLimitExceeded:
      description: Too many requests - rate limit exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: "rate_limit_exceeded"
              message: "Rate limit exceeded. Limits are 10/min on Essentials, 60/min on Growth, and 300/min on Enterprise. Check the Retry-After header."
      headers:
        Retry-After:
          schema:
            type: integer
          description: Number of seconds to wait before retrying

    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: "internal_error"
              message: "An unexpected error occurred"
